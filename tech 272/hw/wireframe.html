<html>
    <head>
        <title> Wireframe </title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 20px;
               
            }
            .header {
                padding: 2em;
                border: 3px solid black;
                width: 300px;
                height: 150px;
                text-align: center;
                font-style: italic;
            }
            .container {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                margin: 20px 0;
            }
            .center-box {
                padding: 2em;
                border: 3px solid black;
                width: 200px;
                height: 600px;
                text-align: center;
                font-style: italic;
                margin-right: 20px;
            }
            .bottom-box {
                padding: 2em;
                border: 3px solid black;
                width: 600px;
                height: 150px;
                font-style: italic;
                text-align: center;
            }
            .text {
                font-size: 20px;
            }
        </style>
    </head>
<body>
    <div class="header">introduction/table of contents</div>
    <div class="container">
        <div class="center-box">pictures/interesting things</div>
        <div class="text"> </div>
    </div>
    <div class="bottom-box">
    more info
    </div>
</body>
</html>
